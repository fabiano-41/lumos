<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato</title>

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="contato.css">
</head>

<body>


    <header>
  <nav>
    <img class="logo" src="letrado.jpg" alt="">
    
    <div class="menu">
      <a href="http://127.0.0.1:5500/index.html">Início</a>
      <a href="#servicos">Serviços</a>
      <a href="#sobre">Sobre</a>
      <a href="http://127.0.0.1:5500/contato.html?">Contato</a>
    </div>

    <button class="btn1">Solicitar Orçamento</button>
  </nav>


</header>
<section class="contato">
  <h2>Entre em contato </h2>

  <div class="container-contato">
    
    <!-- FORM -->
    <form class="form-contato" onsubmit="enviarWhats(event)">
      <input type="text" id="nome" placeholder="Seu Nome" required>
      <input type="email" id="email" placeholder="Seu Email" required>
      <textarea id="mensagem" placeholder="Sua Mensagem" required></textarea>
      <button type="submit">Enviar Mensagem</button>
    </form>

    <!-- INFO -->
    <div class="info-contato">
      <h3>Contato</h3>
      <p><i class="fa fa-envelope"></i> contato@lumus.com</p>
      <p><i class="fa fa-phone"></i> (31) 99999-9999</p>
      <p><i class="fa fa-location-dot"></i> Minas Gerais, Brasil</p>
    </div>

  </div>

     <!-- MAPA -->
    <div class="mapa">
        <h2>venha nos visitar pesoalmente </h2>
      <iframe 
        src="https://www.google.com/maps?q=C-R.+Caxambú,+60+Melo+Viana+Cel.+Fabriciano+MGl&output=embed"
        loading="lazy">
      </iframe>
    </div>

  </div>
</section>

<script>
function enviarWhats(event) {
  event.preventDefault();

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let mensagem = document.getElementById("mensagem").value;

  let texto =  `Olá, meu nome é ${nome} %0AEmail: ${email}%0AMensagem: ${mensagem}`;

  let numero = "5531982242705"; 

  window.open(`https://wa.me/${numero}?text=${texto}`, "_blank");
}
</script>
<footer>
  <p>© 2026 Lumus Solution - Todos os direitos reservados</p>
</footer>


</body>
</html>
